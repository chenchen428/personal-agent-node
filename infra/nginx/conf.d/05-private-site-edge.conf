# Shared Edge metadata intentionally excludes client IP, URL, headers, cookies, and bodies.
log_format private_site_metrics escape=json '{"timestamp":"$time_iso8601","domain":"$host","status":$status,"bytesIn":$request_length,"bytesOut":$bytes_sent,"duration":$request_time}';
limit_conn_zone $host zone=private_site_host:10m;
limit_conn_zone $binary_remote_addr zone=private_site_source:10m;
limit_req_zone $binary_remote_addr zone=private_site_requests:10m rate=30r/s;
include /etc/private-site-edge/nginx/*.conf;
