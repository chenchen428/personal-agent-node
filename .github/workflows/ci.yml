name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22
          - os: macos-latest
            node: 22
          - os: windows-latest
            node: 22
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: core/runtime/native/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust test cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/desktop/src-tauri/target
          key: cargo-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('core/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-test-${{ runner.os }}-${{ runner.arch }}-
      - name: Install Linux desktop test dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
      - run: npm run doctor
      - run: npm run guard
      - run: npm test
      - run: npm run check
