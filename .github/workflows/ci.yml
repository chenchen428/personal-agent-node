name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Source checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run doctor
      - run: npm run guard
      - run: npm run check

  test:
    name: test (${{ matrix.os }}, ${{ matrix.suite }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        suite: [desktop, native, node]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v7
        if: matrix.suite == 'native'
        with:
          go-version: '1.24.x'
          cache-dependency-path: core/runtime/native/go.mod
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.suite == 'desktop'
      - name: Restore Rust test cache
        if: matrix.suite == 'desktop'
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/desktop/src-tauri/target
          key: cargo-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('core/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-test-${{ runner.os }}-${{ runner.arch }}-
      - name: Install Linux desktop test dependencies
        if: matrix.suite == 'desktop' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
        if: matrix.suite == 'node'
      - run: npm run desktop:test
        if: matrix.suite == 'desktop'
      - run: npm run native:test
        if: matrix.suite == 'native'
      - name: Run JavaScript test suites
        if: matrix.suite == 'node'
        run: npm run harness:test && npm run test:runtime && npm run test:edge && npm run test:agent
