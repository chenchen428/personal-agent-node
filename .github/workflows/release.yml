name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/release-check.mjs --tag "${GITHUB_REF_NAME}"
      - run: npm run doctor
      - run: npm run guard
      - run: npm test
      - run: npm run check
      - run: node scripts/release-package.mjs --tag "${GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: personal-agent-node-${{ github.ref_name }}
          path: dist/releases/${{ github.ref_name }}/*
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/${{ github.ref_name }}/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
