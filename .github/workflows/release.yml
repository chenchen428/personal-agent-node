name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  NODE_VERSION: 22.23.1
  GO_VERSION: 1.24.x

jobs:
  source:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/runtime/native/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux desktop test dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
      - run: node scripts/release-check.mjs --tag "${GITHUB_REF_NAME}"
      - run: npm run doctor
      - run: npm run guard
      - run: npm test
      - run: npm run check
      - run: node scripts/release-package.mjs --tag "${GITHUB_REF_NAME}" --stage dist/release-payload --output dist/source-release
      - uses: actions/upload-artifact@v4
        with:
          name: immutable-node-payload
          path: dist/release-payload
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: source-release-metadata
          path: dist/source-release
          if-no-files-found: error
          retention-days: 7

  platform:
    needs: source
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            platform: win32
            arch: x64
            asset: windows-x64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
            asset: macos-x64
          - runner: macos-15
            platform: darwin
            arch: arm64
            asset: macos-arm64
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            asset: linux-x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            asset: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/runtime/native/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Install Linux desktop build dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: actions/download-artifact@v4
        with:
          name: immutable-node-payload
          path: dist/release-payload
      - name: Verify signing inputs (Windows)
        if: matrix.platform == 'win32' && !contains(github.ref_name, '-')
        shell: pwsh
        env:
          CERTIFICATE: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:PASSWORD)) { throw 'Windows signing secrets are required' }
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\personal-agent-signing.pfx", [Convert]::FromBase64String($env:CERTIFICATE))
      - name: Import signing identities (macOS)
        if: matrix.platform == 'darwin' && !contains(github.ref_name, '-')
        shell: bash
        env:
          P12_BASE64: ${{ secrets.APPLE_SIGNING_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_SIGNING_P12_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLICATION_IDENTITY: ${{ secrets.APPLE_APPLICATION_IDENTITY }}
          INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
        run: |
          test -n "$P12_BASE64" && test -n "$P12_PASSWORD" && test -n "$NOTARY_KEY_BASE64"
          test -n "$APPLICATION_IDENTITY" && test -n "$INSTALLER_IDENTITY" && test -n "$NOTARY_KEY_ID" && test -n "$NOTARY_ISSUER"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/personal-agent-signing.p12"
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/personal-agent-notary.p8"
          security create-keychain -p "$RUNNER_TEMP" "$RUNNER_TEMP/personal-agent.keychain-db"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/personal-agent.keychain-db"
          security unlock-keychain -p "$RUNNER_TEMP" "$RUNNER_TEMP/personal-agent.keychain-db"
          security import "$RUNNER_TEMP/personal-agent-signing.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$RUNNER_TEMP/personal-agent.keychain-db"
          security list-keychain -d user -s "$RUNNER_TEMP/personal-agent.keychain-db"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$RUNNER_TEMP" "$RUNNER_TEMP/personal-agent.keychain-db"
      - name: Fetch and verify pinned Node runtime
        shell: bash
        run: node scripts/fetch-node-runtime.mjs --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}" --output "${RUNNER_TEMP}/node-runtime${{ matrix.platform == 'win32' && '.exe' || '' }}"
      - name: Build and overlay Tauri desktop shell
        shell: bash
        run: node scripts/build-desktop-shell.mjs --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}" --output "dist/desktop/${{ matrix.platform }}-${{ matrix.arch }}" --release-root dist/release-payload
      - name: Build, smoke-test, sign, and package platform installer
        shell: bash
        env:
          REQUIRE_NATIVE_SIGNING: ${{ !contains(github.ref_name, '-') }}
          PERSONAL_AGENT_WINDOWS_SIGNING_CERTIFICATE: ${{ matrix.platform == 'win32' && !contains(github.ref_name, '-') && format('{0}/personal-agent-signing.pfx', runner.temp) || '' }}
          PERSONAL_AGENT_WINDOWS_SIGNING_PASSWORD: ${{ !contains(github.ref_name, '-') && secrets.WINDOWS_SIGNING_PFX_PASSWORD || '' }}
          PERSONAL_AGENT_APPLE_APPLICATION_IDENTITY: ${{ !contains(github.ref_name, '-') && secrets.APPLE_APPLICATION_IDENTITY || '' }}
          PERSONAL_AGENT_APPLE_INSTALLER_IDENTITY: ${{ !contains(github.ref_name, '-') && secrets.APPLE_INSTALLER_IDENTITY || '' }}
          PERSONAL_AGENT_APPLE_NOTARY_KEY: ${{ matrix.platform == 'darwin' && !contains(github.ref_name, '-') && format('{0}/personal-agent-notary.p8', runner.temp) || '' }}
          PERSONAL_AGENT_APPLE_NOTARY_KEY_ID: ${{ !contains(github.ref_name, '-') && secrets.APPLE_NOTARY_KEY_ID || '' }}
          PERSONAL_AGENT_APPLE_NOTARY_ISSUER: ${{ !contains(github.ref_name, '-') && secrets.APPLE_NOTARY_ISSUER || '' }}
        run: |
          signing_args=()
          if [[ "$REQUIRE_NATIVE_SIGNING" == "true" ]]; then signing_args+=(--require-signing); fi
          node scripts/build-platform-installer.mjs --tag "$GITHUB_REF_NAME" --release-root dist/release-payload --node-runtime "${RUNNER_TEMP}/node-runtime${{ matrix.platform == 'win32' && '.exe' || '' }}" --output dist/platform --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}" "${signing_args[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.asset }}
          path: dist/platform/*
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: platform
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          pattern: platform-*
          path: dist/release
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: source-release-metadata
          path: dist/source-release
      - name: Assemble customer-facing assets and private release evidence
        shell: bash
        run: |
          node scripts/assemble-public-release-assets.mjs \
            --tag "$GITHUB_REF_NAME" \
            --input dist/release \
            --output dist/public-release \
            --evidence dist/release-evidence \
            --source-metadata dist/source-release
          node scripts/write-release-security-metadata.mjs --tag "$GITHUB_REF_NAME" --output dist/release-evidence/RELEASE-SECURITY.json
      - uses: sigstore/cosign-installer@v3
      - name: Keyless-sign customer assets into CI evidence
        shell: bash
        run: |
          for asset in dist/public-release/*; do
            cosign sign-blob --yes --bundle "dist/release-evidence/$(basename "$asset").sigstore.json" "$asset"
          done
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/public-release/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: dist/release-evidence
          if-no-files-found: error
          retention-days: 90
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/public-release/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
